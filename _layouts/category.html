---
layout: default
---
<section id="hero">
	<div class="post-hero">
		<h1>Категория: {{ page.title }}</h1>
	</div>
</section>
<section id="post">
	<div class="post-content">
    {% for category in site.categories %}
		<h3>{{ category.title }}</h3>
		<div class="post-meta">
			{% if category.posts %}
			<div class="tags">
				{% for post in category.posts %}
				<span class="tag">{{ post.title }}</span>
				{% endfor %}
			</div>
			{% endif %}
		</div>
    {% endfor %}
	</div>
</section>
<section id="ready">
    <div class="hero-content" />
</section>
