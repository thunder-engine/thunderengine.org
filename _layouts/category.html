---
layout: default
---
<section id="hero">
	<div class="post-hero">
		<h1>Категория: {{ page.title }}</h1>
	</div>
</section>
<section id="post">
	<div class="post-content">
    {% for category in site.categories %}
		{% assign category_name = category[0] %}
		{% assign posts = category[1] %}
		<h3>{{ category_name }}</h3>
		<div class="post-meta">
			{% for post in posts %}
			<span class="tag">{{ post.title }}</span>
			{% endfor %}
		</div>
    {% endfor %}
	</div>
</section>
<section id="ready">
    <div class="hero-content" />
</section>
