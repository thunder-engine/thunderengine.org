---
layout: default
title: Thunder Engine Development Blog
permalink: /blog/
---
<section id="hero">
	<div class="post-hero" />
</section>
<section id="post">
	<div class="post-content">
		<div class="content-grid">
{% for post in site.posts %}
			<div class="content-card">
				<div class="content-block">
					<img src="{{ post.image }}">
					<h3 id="editor-title">{{ post.title }}</h3>
					<p id="editor-paragraph">{{ post.excerpt }}</p>
					<a href="{{ post.url }}" class="content-button">Read More</a>
				</div>
			</div>
{% endfor %}
		</div>
	</div>
</section>
<section id="ready">
    <div class="hero-content" />
</section>
