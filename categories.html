---
layout: default
title: Thunder Engine Development Blog
permalink: /blog/
---
<div class="body-image"><img src="/imges/community.jpg"></div>
<section id="hero">
	<div class="post-hero"></div>
</section>
<section id="post">
	<div class="content-grid">
{% for post in site.posts %}
		<a href="{{ post.url }}">
			<div class="content-card">
				<div class="content-block">
					<img src="{{ post.image }}">
					<h3 id="editor-title">{{ post.title }}</h3>
					{{ post.excerpt }}
				</div>
			</div>
		</a>
{% endfor %}
	</div>
</section>
<section id="ready">
    <div class="hero-content"></div>
</section>
